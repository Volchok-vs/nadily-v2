<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід у систему територій</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-login {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #0056b3;
        }

        .error-msg {
            color: #dc3545;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }

        .password-wrapper {
            width: 100%;
        }

        .password-wrapper input {
            box-sizing: border-box;
        }

        #togglePassword:hover {
            color: #007bff;
        }

        #togglePassword:focus {
            outline: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2>Вхід для вісників</h2>

        <div class="input-group">
            <label for="name">Прізвище та Ім'я</label>
            <input type="text" id="name" placeholder="Наприклад: Петренко Іван" required>
        </div>

        <div class="input-group">
            <label for="password">Пароль (Секретний ключ)</label>
            <div class="password-wrapper" style="position: relative; display: flex; align-items: center;">
                <input type="password" id="password" placeholder="Введіть ваш ключ" required
                    style="width: 100%; padding-right: 45px;">
                <button type="button" id="togglePassword"
                    style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 20px; line-height: 1; padding: 5px; color: #666; user-select: none;">
                    🔒
                </button>
            </div>
        </div>

        <button class="btn-login" id="submitLogin">УВІЙТИ</button>

        <div id="error" class="error-msg">Невірне ім'я або пароль.</div>

        <a href="index.html" class="back-link">← Повернутися до карти</a>
    </div>

    <script type="module">
        import { supabase } from "./js/config.js";

        // Основна функція авторизації
        async function handleLogin() {
            const nameInput = document.getElementById('name');
            const passwordInput = document.getElementById('password');
            const errorDiv = document.getElementById('error');

            if (!nameInput || !passwordInput || !errorDiv) return;

            // 🛑 ДЕБАГ-ПЕРЕВІРКА №1: Чи взагалі існує підключення до Supabase?
            if (typeof supabase === 'undefined' || !supabase) {
                console.error("КРИТИЧНА ПОМИЛКА: Об'єкт 'supabase' не ініціалізований або імпортується невірно з config.js!");
                alert("Помилка конфігурації: клієнт бази даних не знайдений.");
                return;
            }

            const name = nameInput.value.trim();
            const key = passwordInput.value.trim();

            errorDiv.style.display = 'none';

            if (!name || !key) {
                alert("Заповніть усі поля");
                return;
            }

            try {
                // Запит до Supabase з ПРАВИЛЬНИМ синтаксисом передачі заголовків для RLS
                const { data, error } = await supabase
                    .from('publishers', { headers: { 'x-publisher-key': key } })
                    .select('id, name, role, secret_key')
                    .eq('name', name)
                    .eq('secret_key', key)
                    .maybeSingle();

                if (error || !data) {
                    console.warn("Авторизація відхилена базою даних:", error);
                    errorDiv.style.display = 'block';
                    return;
                }

                console.log("Отримані дані користувача:", data);

                // Запис у localStorage
                localStorage.setItem('userId', data.id);
                localStorage.setItem('userName', data.name);
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('userKey', data.secret_key);

                // Перенаправлення на карту
                window.location.href = `index.html?key=${encodeURIComponent(data.secret_key)}`;

            } catch (err) {
                console.error("Критична помилка виконання скрипта всередині try-catch:", err.message, err.stack);
                alert(`Сталася технічна помилка: ${err.message}`);
            }
        }

        // Універсальна ініціалізація подій
        function initEvents() {
            const passwordInput = document.getElementById('password');
            const nameInput = document.getElementById('name');
            const toggleBtn = document.getElementById('togglePassword');
            const submitBtn = document.getElementById('submitLogin');

            if (submitBtn) {
                submitBtn.removeEventListener('click', handleLogin);
                submitBtn.addEventListener('click', handleLogin);
            }

            // Використовуємо keydown замість keypress для повної кросбраузерності
            if (nameInput) {
                nameInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') handleLogin();
                });
            }
            if (passwordInput) {
                passwordInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') handleLogin();
                });
            }

            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', () => {
                    const isPassword = passwordInput.getAttribute('type') === 'password';
                    passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                    toggleBtn.textContent = isPassword ? '👁️' : '🔒';
                });
            }
        }

        // Запуск ініціалізації залежно від готовності DOM-дерева
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initEvents);
        } else {
            initEvents();
        }
    </script>

</body>

</html>
