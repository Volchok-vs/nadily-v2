<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Карта ділянок - Supabase & Hamburger</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* КОНТЕЙНЕР МЕНЮ */
        .menu-container {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
        }

        /* КНОПКА ГАМБУРГЕР */
        .hamburger {
            background: #333;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 16px;
        }

        /* ПАНЕЛЬ КЕРУВАННЯ */
        .controls {
            display: none; /* Сховано за замовчуванням */
            flex-direction: column;
            gap: 8px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 260px;
        }

        .controls.active { display: flex; }

        /* КНОПКИ */
        button { 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 4px; 
            border: none; 
            color: white; 
            font-weight: bold; 
            font-size: 13px;
        }

        .btn-save { background: #28a745; width: 100%; }
        .btn-upload { background: #007bff; flex: 2; }
        .btn-clear { background: #dc3545; flex: 1; }

        /* ГРУПУВАННЯ */
        .row-group {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 5px 0;
        }

        /* ЧЕКБОКС */
        .checkbox-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #f1f1f1;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }

        #enableLabelMove { width: 18px; height: 18px; cursor: pointer; }

        #output {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px;
            font-size: 10px;
            max-width: 200px;
            border-radius: 4px;
            pointer-events: none;
        }

        .leaflet-tooltip { 
            background: white; 
            border: 1px solid #333; 
            font-weight: bold; 
            color: #000; 
        }

        /* МОДАЛЬНЕ ВІКНО */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 400px;
            max-width: 90%;
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .checkbox-group select {
            flex-grow: 1;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-modal-save {
            background: #28a745;
            color: white;
        }

        .btn-modal-save:hover {
            background: #218838;
        }

        .btn-modal-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-modal-cancel:hover {
            background: #5a6268;
        }

        /* Робимо контейнер гнучким, щоб кнопки були в ряд */
.menu-container {
    position: absolute;
    top: 10px;
    left: 50px;
    z-index: 1000;
    display: flex;
    flex-direction: column; /* Меню випадає вниз */
    gap: 8px;
}

        /* Стиль для кнопки виходу */
        .btn-exit {
            background: #6c757d; /* Спокійний сірий колір */
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background 0.3s, transform 0.2s;
        }

        .btn-exit:hover {
            background: #5a6268;
            transform: translateY(-1px); /* Легкий ефект натискання */
        }

        /* Переконайтеся, що гамбургер має таку ж висоту */
        .hamburger {
            background: #333;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .hamburger:hover {
            background: #444;
        }

        /* Щоб панель керування не зміщувалася */
        .controls {
            margin-top: 0; /* Оскільки ми додали gap у контейнер */
        }
    </style>
</head>
<body>

<div class="menu-container">
    <div style="display: flex; gap: 8px;">
        <button class="hamburger" onclick="toggleMenu()">☰ Меню</button>
        <button class="btn-exit" onclick="window.location.href='index.html'">🏠 На головну</button>
    </div>

    <div class="controls" id="menuControls">
        <button class="btn-save" onclick="window.downloadGeoJSON()">💾 Скачати .geojson</button>
        
        <hr>

        <div class="row-group">
            <button class="btn-upload" onclick="window.handleUpload()">📥 Завантажити</button>
            <button class="btn-clear" onclick="window.clearMap()">🗑 Очистити</button>
        </div>
        <input type="file" id="fileInput" accept=".geojson" style="font-size: 10px; margin-top: 5px;">

        <hr>

        <label class="checkbox-label">
            <input type="checkbox" id="enableLabelMove"> 
            <span>✢ Редагувати ярлики</span>
        </label>
    </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО ДЛЯ ДОДАВАННЯ/РЕДАГУВАННЯ ДІЛЯНКИ -->
<div id="parcelModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Інформація про ділянку</div>
        
        <div class="form-group">
            <label for="parcelName">Назва/Номер ділянки:</label>
            <input type="text" id="parcelName" placeholder="Наприклад: №1, Ділянка А">
        </div>

        <div class="form-group">
            <label>Категорія ділянки:</label>
            <div class="checkbox-group">
                <input type="checkbox" id="editSectorCheck" title="Дозволити зміну типу">
                <label for="sectorTypeSelect" style="font-size: 14px; flex-shrink: 0;">Тип:</label>
                <select id="sectorTypeSelect" disabled style="flex-grow: 1; padding: 5px; border-radius: 5px;">
                    <option value="Приватний сектор">Приватний сектор</option>
                    <option value="Поверхівки">Поверхівки</option>
                    <option value="Змішані">Змішані</option>
                    <option value="Ділова">Ділова</option>
                    <option value="Село">Село</option>
                </select>
            </div>
        </div>

        <div class="modal-buttons">
            <button class="btn-modal-cancel" onclick="window.closeParcelModal()">Скасувати</button>
            <button class="btn-modal-save" onclick="window.saveParcelInfo()">Зберегти</button>
        </div>
    </div>
</div>

<div id="map"></div>
<div id="output">Статус бази...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script type="module">
    import { supabase } from "./js/config.js"; // Просто імпортуємо готову "розетку"

    // Глобальна змінна для зберігання поточного шару в модалі
    window.currentModalLayer = null;
    window.isEditingMode = false;

    // Функція гамбургера
    window.toggleMenu = function() {
        document.getElementById('menuControls').classList.toggle('active');
    }

    // Функції для модального вікна
    window.openParcelModal = function(layer = null, isEdit = false) {
        const modal = document.getElementById('parcelModal');
        const nameInput = document.getElementById('parcelName');
        const categorySelect = document.getElementById('sectorTypeSelect');
        const editCheckbox = document.getElementById('editSectorCheck');
        
        window.currentModalLayer = layer;
        window.isEditingMode = isEdit;

        if (layer && layer.feature && layer.feature.properties) {
            nameInput.value = layer.feature.properties.name || '';
            categorySelect.value = layer.feature.properties.category || 'Приватний сектор';
        } else {
            nameInput.value = '';
            categorySelect.value = 'Приватний сектор';
        }

        // У режимі редагування дозволяємо змінювати категорію
        editCheckbox.checked = isEdit;
        categorySelect.disabled = !isEdit;

        // Слухач для чекбокса
        editCheckbox.onchange = function() {
            categorySelect.disabled = !this.checked;
        };

        modal.classList.add('show');
        nameInput.focus();
    }

    window.closeParcelModal = function() {
        const modal = document.getElementById('parcelModal');
        modal.classList.remove('show');
        window.currentModalLayer = null;
    }

    window.saveParcelInfo = function() {
        const nameInput = document.getElementById('parcelName');
        const categorySelect = document.getElementById('sectorTypeSelect');
        const name = nameInput.value.trim();

        if (!name) {
            alert('⚠️ Введіть назву ділянки');
            return;
        }

        if (!window.currentModalLayer) {
            window.closeParcelModal();
            return;
        }

        const layer = window.currentModalLayer;
        const category = categorySelect.value;

        // Оновлюємо властивості шару
        if (!layer.feature) {
            layer.feature = { type: "Feature", properties: {} };
        }
        layer.feature.properties.name = name;
        layer.feature.properties.category = category;

        // Оновлюємо тултіп (показуємо тільки назву)
        const tooltipText = `${name}`;
        layer.setTooltipContent(tooltipText);
        layer.openTooltip(layer.getTooltip().getLatLng());

        // Зберігаємо в базу
        saveToSupabase();
        window.closeParcelModal();
    }

    // Карта з різними шарами
    // 1. ОПИС БАЗОВИХ ШАРІВ
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
        attribution: '© OpenStreetMap contributors' 
    });
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { 
        attribution: '© OpenTopoMap (SRTM)' 
    });
    const satelliteOnly = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { 
        pane: 'shadowPane' 
    });
    const satelliteHybrid = L.layerGroup([satelliteOnly, labels]);

    // 2. Об'єднуємо в словник базових шарів
    const baseMaps = {
        "🛰️ Гібрид": satelliteHybrid,
        "🗺️ Схема (OSM)": osm,
        "⛰️ Рельєф (Topo)": topo
    };

    // Перевіряємо localStorage для збереженого вибору
    const savedLayerName = localStorage.getItem('selectedBaseLayer');
    const initialLayer = (savedLayerName && baseMaps[savedLayerName])
        ? baseMaps[savedLayerName]
        : satelliteHybrid;

    // 3. ІНІЦІАЛІЗАЦІЯ КАРТИ
    var map = L.map('map', {
        preferCanvas: false,
        center: [49.2321, 29.0577],
        zoom: 15,
        layers: [initialLayer],
        zoomControl: false
    });

    // Додаємо перемикач шарів
    L.control.layers(baseMaps, null, {
        position: 'bottomleft',
        collapsed: true
    }).addTo(map);

    // Зберігаємо вибір шару в localStorage
    map.on('baselayerchange', function (e) {
        localStorage.setItem('selectedBaseLayer', e.name);
        console.log("💾 Шар збережено:", e.name);
    });

    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // Налаштування шару
    window.setupLayer = function(layer, feature) {
        var props = feature.properties || {};
        var name = props.name || "Без назви";
        var category = props.category || "Приватний сектор";
        
        // Перевірка формату координат (масив чи об'єкт)
        var labelPos;
        if (props.labelPos) {
            labelPos = L.latLng(props.labelPos);
        } else {
            labelPos = layer.getBounds().getCenter();
        }
        
        const tooltipText = `${name}`;
        layer.bindTooltip(tooltipText, { 
            permanent: true, 
            direction: 'center' 
        });
        layer.openTooltip(labelPos); // Примусове відкриття в точці

        layer.on('click', function (e) {
            L.DomEvent.stopPropagation(e);
            if (!document.getElementById('enableLabelMove').checked) {
                // Якщо режим редагування вимкнено, відкриємо модалю для перегляду/редагування
                window.openParcelModal(layer, false);
                return;
            }

            var newPos = e.latlng;
            // Оновлюємо тултіп на нову позицію
            layer.setTooltipContent(tooltipText); 
            layer.openTooltip(newPos);
            
            if (!layer.feature) layer.feature = { type: "Feature", properties: {} };
            layer.feature.properties.name = name;
            layer.feature.properties.category = category;
            layer.feature.properties.labelPos = [newPos.lat, newPos.lng];
            
            saveToSupabase();
        });
    }

    // Збереження
    async function saveToSupabase() {
    const parcels = [];
    drawnItems.eachLayer(layer => {
        let name = "Без назви";
        let category = "Приватний сектор";
        
        if (layer.feature && layer.feature.properties) {
            name = layer.feature.properties.name || "Без назви";
            category = layer.feature.properties.category || "Приватний сектор";
        }
        
        let labelPos = null;
        if (layer.getTooltip()) {
            const ll = layer.getTooltip().getLatLng();
            labelPos = [ll.lat, ll.lng];
        }

        parcels.push({
            name: name,
            category: category,
            geom: layer.toGeoJSON().geometry,
            label_pos: labelPos
        });
    });

    // Використовуємо upsert. Він знайде запис за 'name' і оновить тільки geom та label_pos
    const { error } = await supabase
        .from('parcels')
        .upsert(parcels, { onConflict: 'name' }); 

    if (!error) {
        document.getElementById('output').innerText = "Зміни збережено (без втрати даних)";
    } else {
        console.error("Помилка збереження:", error.message);
        document.getElementById('output').innerText = "Помилка збереження!";
    }
}

    // Завантаження файлу
    window.handleUpload = async function() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Файл не обрано");

        const text = await file.text();
        const geojson = JSON.parse(text);
        const parcels = geojson.features.map(f => ({
            name: f.properties?.name || f.properties?.Name || "№?",
            category: f.properties?.category || "Приватний сектор",
            geom: f.geometry,
            label_pos: f.properties?.labelPos || null
        }));

        // Замість видалення - розумне оновлення
        const { error } = await supabase.from('parcels').upsert(parcels, { onConflict: 'name' });
        
        if (!error) {
            loadParcelsFromDB();
        } else {
            alert("Помилка завантаження: " + error.message);
        }
    }

    // Завантаження з бази
    async function loadParcelsFromDB() {
        drawnItems.clearLayers();
        let { data, error } = await supabase.from('parcels').select('*');
        if (error) return;

        data.forEach(p => {
            L.geoJSON(p.geom, {
                onEachFeature: function (f, layer) {
                    f.properties = { 
                        name: p.name, 
                        category: p.category || "Приватний сектор",
                        labelPos: p.label_pos 
                    };
                    layer.feature = f;
                    drawnItems.addLayer(layer);
                    window.setupLayer(layer, f);
                }
            });
        });
        document.getElementById('output').innerText = "Завантажено: " + data.length;
    }

    // Малювання
    var drawControl = new L.Control.Draw({
        draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false, circlemarker: false },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    map.on('draw:created', function (e) {
        var layer = e.layer;
        layer.feature = { 
            type: "Feature", 
            properties: { 
                name: "Нова ділянка",
                category: "Приватний сектор"
            } 
        };
        drawnItems.addLayer(layer);
        window.setupLayer(layer, layer.feature);
        // Відкриваємо модалю для введення інформації
        window.openParcelModal(layer, true);
    });

    map.on('draw:edited', saveToSupabase);
    map.on('draw:deleted', async function (e) {
        const layers = e.layers;
        layers.eachLayer(async (layer) => {
            const name = layer.feature?.properties?.name;
            if (name) {
                // Видаляємо конкретно цю дільницю за назвою
                const { error } = await supabase.from('parcels').delete().eq('name', name);
                if (!error) {
                    console.log(`Дільницю ${name} видалено з бази`);
                } else {
                    console.error("Помилка видалення:", error.message);
                }
            }
        });
        // Після видалення оновлюємо інші дільниці
        saveToSupabase(); 
    });;

    window.downloadGeoJSON = function() {
        var data = drawnItems.toGeoJSON();
        var blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "map.geojson";
        a.click();
    }

    window.clearMap = async function() {
    // Перший рівень: звичайне питання
    const firstCheck = confirm("⚠️ Ви впевнені, що хочете ПОВНІСТЮ ОЧИСТИТИ БАЗУ ДАНИХ?\nЦю дію неможливо скасувати.");
    
    if (firstCheck) {
        // Другий рівень: захист від "випадкового ОК"
        const secondCheck = prompt("Для підтвердження введіть слово: ВИДАЛИТИ");
        
        if (secondCheck === "ВИДАЛИТИ") {
            try {
                document.getElementById('output').innerText = "Видалення...";
                
                // Видаляємо всі записи в Supabase
                const { error } = await supabase.from('parcels').delete().neq('id', 0);
                
                if (error) throw error;

                // Очищаємо карту
                drawnItems.clearLayers();
                document.getElementById('output').innerText = "Базу успішно очищено.";
                console.log("Database cleared by user.");
                
            } catch (err) {
                console.error("Помилка при видаленні:", err.message);
                alert("Не вдалося видалити: " + err.message);
            }
        } else {
            alert("Слово введено неправильно. Видалення скасовано.");
        }
    }
}

    loadParcelsFromDB();
</script>

</body>
</html>
