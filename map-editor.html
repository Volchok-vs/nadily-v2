<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Карта ділянок - Supabase & Hamburger</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* КОНТЕЙНЕР МЕНЮ */
        .menu-container {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            display: flex;
            flex-direction: column; /* Меню випадає вниз */
            gap: 8px;
        }

        /* КНОПКА ГАМБУРГЕР */
        .hamburger {
            background: #333;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 16px;
        }

        .hamburger:hover {
            background: #444;
        }

        /* Стиль для кнопки виходу */
        .btn-exit {
            background: #6c757d; /* Спокійний сірий колір */
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background 0.3s, transform 0.2s;
        }

        .btn-exit:hover {
            background: #5a6268;
            transform: translateY(-1px); /* Легкий ефект натискання */
        }

        /* ПАНЕЛЬ КЕРУВАННЯ */
        .controls {
            display: none; /* Сховано за замовчуванням */
            flex-direction: column;
            gap: 8px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 0; /* Оскільки ми додали gap у контейнер */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 260px;
        }

        .controls.active { display: flex; }

        /* КНОПКИ */
        button { 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 4px; 
            border: none; 
            color: white; 
            font-weight: bold; 
            font-size: 13px;
        }

        .btn-save { background: #28a745; width: 100%; }
        .btn-upload { background: #007bff; flex: 2; }
        .btn-clear { background: #dc3545; flex: 1; }

        /* ГРУПУВАННЯ */
        .row-group {
            display: flex;
            gap: 5px;
            width: 100%;
        }

        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 5px 0;
        }

        /* ЧЕКБОКС */
        .checkbox-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #f1f1f1;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }

        #enableLabelMove { width: 18px; height: 18px; cursor: pointer; }

        #output {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px;
            font-size: 10px;
            max-width: 200px;
            border-radius: 4px;
            pointer-events: none;
        }

        .leaflet-tooltip { 
            background: white; 
            border: 1px solid #333; 
            font-weight: bold; 
            color: #000; 
        }

        /* МОДАЛЬНЕ ВІКНО */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 400px;
            max-width: 90%;
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .checkbox-group select {
            flex-grow: 1;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-modal-save {
            background: #28a745;
            color: white;
        }

        .btn-modal-save:hover {
            background: #218838;
        }

        .btn-modal-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-modal-cancel:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <div style="display: flex; gap: 8px;">
        <button class="hamburger" onclick="toggleMenu()">☰ Меню</button>
        <button class="btn-exit" onclick="window.location.href='index.html'">🏠 На головну</button>
    </div>

    <div class="controls" id="menuControls">
        <button class="btn-save" onclick="window.downloadGeoJSON()">💾 Скачати .geojson</button>
        
        <hr>

        <div class="row-group">
            <button class="btn-upload" onclick="window.handleUpload()">📥 Завантажити</button>
            <button class="btn-clear" onclick="window.clearMap()">🗑 Очистити</button>
        </div>
        <input type="file" id="fileInput" accept=".geojson" style="font-size: 10px; margin-top: 5px;">

        <hr>

        <label class="checkbox-label">
            <input type="checkbox" id="enableLabelMove"> 
            <span>✢ Редагувати ярлики</span>
        </label>
    </div>
</div>

<div id="parcelModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Інформація про ділянку</div>
        
        <div class="form-group">
            <label for="parcelName">Назва/Номер ділянки:</label>
            <input type="text" id="parcelName" placeholder="Наприклад: №1, Ділянка А">
        </div>

        <div class="form-group">
            <label>Категорія ділянки:</label>
            <div class="checkbox-group">
                <input type="checkbox" id="editSectorCheck" title="Дозволити зміну типу">
                <label for="sectorTypeSelect" style="font-size: 14px; flex-shrink: 0;">Тип:</label>
                <select id="sectorTypeSelect" disabled style="flex-grow: 1; padding: 5px; border-radius: 5px;">
                    <option value="Приватний сектор">Приватний сектор</option>
                    <option value="Поверхівки">Поверхівки</option>
                    <option value="Змішані">Змішані</option>
                    <option value="Ділова">Ділова</option>
                    <option value="Село">Село</option>
                </select>
            </div>
        </div>

        <div class="modal-buttons">
            <button class="btn-modal-cancel" onclick="window.closeParcelModal()">Скасувати</button>
            <button class="btn-modal-save" onclick="window.saveParcelInfo()">Зберегти</button>
        </div>
    </div>
</div>

<div id="map"></div>
<div id="output">Статус бази...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script type="module">
    import { supabase } from "./js/config.js"; 

    window.currentModalLayer = null;
    window.isEditingMode = false;

    // Функція гамбургера
    window.toggleMenu = function() {
        document.getElementById('menuControls').classList.toggle('active');
    }

    // Функції для модального вікна
    window.openParcelModal = function(layer = null, isEdit = false) {
        const modal = document.getElementById('parcelModal');
        const nameInput = document.getElementById('parcelName');
        const categorySelect = document.getElementById('sectorTypeSelect');
        const editCheckbox = document.getElementById('editSectorCheck');
        
        window.currentModalLayer = layer;
        window.isEditingMode = isEdit;

        if (layer && layer.feature && layer.feature.properties) {
            nameInput.value = layer.feature.properties.name || '';
            categorySelect.value = layer.feature.properties.category || 'Приватний сектор';
        } else {
            nameInput.value = '';
            categorySelect.value = 'Приватний сектор';
        }

        // Завжди дозволяємо редагувати поля в модалці
        editCheckbox.checked = true;
        categorySelect.disabled = false;

        editCheckbox.onchange = function() {
            categorySelect.disabled = !this.checked;
        };

        modal.classList.add('show');
        nameInput.focus();
    }

    window.closeParcelModal = function() {
        const modal = document.getElementById('parcelModal');
        modal.classList.remove('show');
        window.currentModalLayer = null;
    }

    window.saveParcelInfo = function() {
        const nameInput = document.getElementById('parcelName');
        const categorySelect = document.getElementById('sectorTypeSelect');
        const name = nameInput.value.trim();

        if (!name) {
            alert('⚠️ Введіть назву ділянки');
            return;
        }

        if (!window.currentModalLayer) {
            window.closeParcelModal();
            return;
        }

        const layer = window.currentModalLayer;
        const category = categorySelect.value;

        if (!layer.feature) {
            layer.feature = { type: "Feature", properties: {} };
        }
        layer.feature.properties.name = name;
        layer.feature.properties.category = category;

        // Оновлюємо тултіп
        layer.setTooltipContent(name);
        
        let currentTooltip = layer.getTooltip();
        if (currentTooltip) {
            layer.openTooltip(currentTooltip.getLatLng());
        } else {
            layer.openTooltip(layer.getBounds().getCenter());
        }

        // Запускаємо збереження в базу
        saveToSupabase();
        window.closeParcelModal();
    }

    // ОПИС БАЗОВИХ ШАРІВ
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
        attribution: '© OpenStreetMap contributors' 
    });
    const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { 
        attribution: '© OpenTopoMap (SRTM)' 
    });
    const satelliteOnly = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', { 
        pane: 'shadowPane' 
    });
    const satelliteHybrid = L.layerGroup([satelliteOnly, labels]);

    const baseMaps = {
        "🛰️ Гібрид": satelliteHybrid,
        "🗺️ Схема (OSM)": osm,
        "⛰️ Рельєф (Topo)": topo
    };

    const savedLayerName = localStorage.getItem('selectedBaseLayer');
    const initialLayer = (savedLayerName && baseMaps[savedLayerName])
        ? baseMaps[savedLayerName]
        : satelliteHybrid;

    var map = L.map('map', {
        preferCanvas: false,
        center: [49.2321, 29.0577],
        zoom: 15,
        layers: [initialLayer],
        zoomControl: false
    });

    L.control.layers(baseMaps, null, {
        position: 'bottomleft',
        collapsed: true
    }).addTo(map);

    map.on('baselayerchange', function (e) {
        localStorage.setItem('selectedBaseLayer', e.name);
    });

    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // НАЛАШТУВАННЯ ШАРУ (Виправлено: беремо актуальне ім'я з властивостей в момент кліку)
    window.setupLayer = function(layer, feature) {
        var props = feature.properties || {};
        var name = props.name || "Без назви";
        
        // Прив'язуємо ID з бази до об'єкта шару Leaflet
        if (feature.id) {
            layer.databaseId = feature.id;
        } else if (props.id) {
            layer.databaseId = props.id;
        }

        var labelPos;
        if (props.labelPos) {
            labelPos = L.latLng(props.labelPos);
        } else {
            labelPos = layer.getBounds().getCenter();
        }
        
        layer.bindTooltip(name, { 
            permanent: true, 
            direction: 'center' 
        });
        layer.openTooltip(labelPos); 

        layer.on('click', function (e) {
            L.DomEvent.stopPropagation(e);
            
            // Якщо РЕЖИМ ПЕРЕМІЩЕННЯ ЯРЛИКІВ УВІМКНЕНО
            if (document.getElementById('enableLabelMove').checked) {
                var newPos = e.latlng;
                
                // 🔥 ВИПРАВЛЕННЯ БАГУ: беремо актуальне ім'я та категорію безпосередньо з об'єкта шару, 
                // щоб воно випадково не скидалося на базові змінні ("Нова ділянка")
                let currentName = "Без назви";
                let currentCategory = "Приватний сектор";
                
                if (layer.feature && layer.feature.properties) {
                    currentName = layer.feature.properties.name || "Без назви";
                    currentCategory = layer.feature.properties.category || "Приватний сектор";
                }

                layer.setTooltipContent(currentName); 
                layer.openTooltip(newPos);
                
                if (!layer.feature) layer.feature = { type: "Feature", properties: {} };
                layer.feature.properties.name = currentName;
                layer.feature.properties.category = currentCategory;
                layer.feature.properties.labelPos = [newPos.lat, newPos.lng];
                
                saveToSupabase();
                return;
            }

            // Якщо режим переміщення вимкнено — відкриваємо модалку редагування
            window.openParcelModal(layer, true);
        });
    }

    // НАДnetworkНЕ ЗБЕРЕЖЕННЯ (Поділ на Нові (.insert) та Старі (.upsert) за ID)
    async function saveToSupabase() {
        const toUpdate = [];
        const toInsert = [];
        
        drawnItems.eachLayer(layer => {
            let name = "Без назви";
            let category = "Приватний сектор";
            
            if (layer.feature && layer.feature.properties) {
                name = layer.feature.properties.name || "Без назви";
                category = layer.feature.properties.category || "Приватний сектор";
            }
            
            let labelPos = null;
            if (layer.getTooltip()) {
                const ll = layer.getTooltip().getLatLng();
                labelPos = [ll.lat, ll.lng];
            }

            const dataRow = {
                name: name,
                category: category,
                geom: layer.toGeoJSON().geometry,
                label_pos: labelPos
            };

            // Якщо є databaseId — це старий об'єкт, оновлюємо. Якщо немає — створюємо.
            if (layer.databaseId) {
                dataRow.id = layer.databaseId;
                toUpdate.push(dataRow);
            } else {
                toInsert.push(dataRow);
            }
        });

        if (toUpdate.length === 0 && toInsert.length === 0) return;

        let hasError = false;
        let errorMessage = "";

        // 1. Оновлюємо існуючі ділянки за унікальним ID
        if (toUpdate.length > 0) {
            const { error } = await supabase
                .from('parcels')
                .upsert(toUpdate, { onConflict: 'id' });
            if (error) {
                hasError = true;
                errorMessage += " Помилка оновлення: " + error.message;
            }
        }

        // 2. Вставляем абсолютно нові ділянки (поля ID немає, база виконає nextval)
        if (toInsert.length > 0) {
            const { data, error } = await supabase
                .from('parcels')
                .insert(toInsert)
                .select('id, name'); 

            if (!error) {
                // Миттєво записуємо згенеровані базою ID назад у карту Leaflet
                if (data && data.length > 0) {
                    drawnItems.eachLayer(layer => {
                        if (!layer.databaseId) {
                            const currentName = layer.feature?.properties?.name;
                            const found = data.find(d => d.name === currentName);
                            if (found) {
                                layer.databaseId = found.id;
                                if (!layer.feature) layer.feature = { type: "Feature", properties: {} };
                                layer.feature.id = found.id;
                            }
                        }
                    });
                }
            } else {
                hasError = true;
                errorMessage += " Помилка створення: " + error.message;
            }
        }

        if (!hasError) {
            document.getElementById('output').innerText = "Зміни збережено успішно";
        } else {
            console.error("Помилка збереження:", errorMessage);
            document.getElementById('output').innerText = errorMessage;
        }
    }

    // Завантаження файлу
    window.handleUpload = async function() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Файл не обрано");

        const text = await file.text();
        const geojson = JSON.parse(text);
        const parcels = geojson.features.map(f => {
            const row = {
                name: f.properties?.name || f.properties?.Name || "№?",
                category: f.properties?.category || "Приватний сектор",
                geom: f.geometry,
                label_pos: f.properties?.labelPos || null
            };
            if (f.id) row.id = f.id;
            return row;
        });

        const { error } = await supabase.from('parcels').upsert(parcels, { onConflict: 'id' });
        
        if (!error) {
            loadParcelsFromDB();
        } else {
            alert("Помилка завантаження: " + error.message);
        }
    }

    // ЗАВАНТАЖЕННЯ З БАЗИ ДАНИХ (Витягуємо та присвоюємо id)
    async function loadParcelsFromDB() {
        drawnItems.clearLayers();
        let { data, error } = await supabase.from('parcels').select('*');
        if (error) return;

        data.forEach(p => {
            L.geoJSON(p.geom, {
                onEachFeature: function (f, layer) {
                    f.properties = { 
                        name: p.name, 
                        category: p.category || "Приватний сектор",
                        labelPos: p.label_pos 
                    };
                    f.id = p.id; 
                    layer.databaseId = p.id; 
                    layer.feature = f;
                    drawnItems.addLayer(layer);
                    window.setupLayer(layer, f);
                }
            });
        });
        document.getElementById('output').innerText = "Завантажено ділянок: " + data.length;
    }

    // Налаштування малювання
    var drawControl = new L.Control.Draw({
        draw: { polygon: true, rectangle: true, circle: false, marker: false, polyline: false, circlemarker: false },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);

    map.on('draw:created', function (e) {
        var layer = e.layer;
        
        if (drawControl && drawControl._toolbars && drawControl._toolbars.draw) {
            drawControl._toolbars.draw.disable();
        }

        layer.feature = { 
            type: "Feature", 
            properties: { 
                name: "Нова ділянка",
                category: "Приватний сектор"
            } 
        };
        drawnItems.addLayer(layer);
        window.setupLayer(layer, layer.feature);
        
        window.openParcelModal(layer, true);
    });

    map.on('draw:edited', saveToSupabase);
    
    // ВИДАЛЕННЯ З БАЗИ ЗА ID
    map.on('draw:deleted', async function (e) {
        const layers = e.layers;
        layers.eachLayer(async (layer) => {
            if (layer.databaseId) {
                const { error } = await supabase.from('parcels').delete().eq('id', layer.databaseId);
                if (!error) console.log(`Ділянку з ID ${layer.databaseId} видалено з бази`);
            } else {
                const name = layer.feature?.properties?.name;
                if (name) {
                    await supabase.from('parcels').delete().eq('name', name);
                }
            }
        });
        saveToSupabase(); 
    });

    window.downloadGeoJSON = function() {
        var data = drawnItems.toGeoJSON();
        var blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "map.geojson";
        a.click();
    }

    window.clearMap = async function() {
        const firstCheck = confirm("⚠️ Ви впевнені, що хочете ПОВНІСТЮ ОЧИСТИТИ БАЗУ ДАНИХ?\nЦю дію неможливо скасувати.");
        if (firstCheck) {
            const secondCheck = prompt("Для підтвердження введіть слово: ВИДАЛИТИ");
            if (secondCheck === "ВИДАЛИТИ") {
                try {
                    document.getElementById('output').innerText = "Видалення...";
                    const { error } = await supabase.from('parcels').delete().neq('id', 0);
                    if (error) throw error;

                    drawnItems.clearLayers();
                    document.getElementById('output').innerText = "Базу успішно очищено.";
                } catch (err) {
                    console.error("Помилка при видаленні:", err.message);
                    alert("Не вдалося видалити: " + err.message);
                }
            } else {
                alert("Слово введено неправильно. Видалення скасовано.");
            }
        }
    }

    // Слухач для чекбокса переміщення ярликів
    document.getElementById('enableLabelMove').addEventListener('change', function() {
        if (this.checked) {
            if (drawControl && drawControl._toolbars && drawControl._toolbars.draw) {
                drawControl._toolbars.draw.disable();
            }
            document.getElementById('output').innerText = "Режим коригування ярликів АКТИВНО.";
        } else {
            document.getElementById('output').innerText = "Режим перегляду карти.";
        }
    });

    loadParcelsFromDB();
</script>

</body>
</html>
